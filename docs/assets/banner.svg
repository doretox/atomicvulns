<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" role="img" aria-label="atomicvulns — one vuln per app. nothing more.">
  <style>
    .title { fill: #1f1f1f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; font-weight: 500; }
    .tagline { fill: #666666; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .divider { stroke: #999999; }
    .ring { stroke: #bfbfbf; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #f5f5f5; }
      .tagline { fill: #a8a8a8; }
      .divider { stroke: #555555; }
      .ring { stroke: #444444; }
    }
    .s-blue { fill: #4a90e2; }
    .s-purple { fill: #9b6cc9; }
    .s-red { fill: #e15554; }
    .s-amber { fill: #e8a33d; }
    .s-green { fill: #4ca771; }
    .s-teal { fill: #3aa9a2; }
    .nucleus { fill: #8a8a8a; }
  </style>

  <circle cx="201" cy="104" r="28" fill="none" class="ring" stroke-width="0.75" stroke-dasharray="2 3"/>
  <circle cx="201" cy="76" r="7" class="s-blue"/>
  <circle cx="225" cy="90" r="7" class="s-purple"/>
  <circle cx="225" cy="118" r="7" class="s-red"/>
  <circle cx="201" cy="132" r="7" class="s-amber"/>
  <circle cx="177" cy="118" r="7" class="s-green"/>
  <circle cx="177" cy="90" r="7" class="s-teal"/>
  <circle cx="201" cy="104" r="10" class="nucleus"/>

  <text x="385" y="120" text-anchor="middle" class="title" font-size="44" letter-spacing="-0.5">atomicvulns</text>

  <line x1="355" y1="145" x2="415" y2="145" class="divider" stroke-width="1"/>

  <text x="385" y="175" text-anchor="middle" class="tagline" font-size="13">one vuln per app. nothing more.</text>
</svg>
